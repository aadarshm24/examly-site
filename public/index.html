<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Examly - Home</title>
    <link rel="icon" type="image/png" href="favicon.png" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Inter", "sans-serif"],
              hand: ["Reenie Beanie", "cursive"],
            },
            animation: {
              float: "float 6s ease-in-out infinite",
            },
            keyframes: {
              float: {
                "0%, 100%": { transform: "translateY(0)" },
                "50%": { transform: "translateY(-10px)" },
              },
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Reenie+Beanie&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body
    class="antialiased selection:bg-gray-500 selection:text-white transition-colors duration-300 overflow-x-hidden"
  >
    <div
      id="semester-modal"
      class="fixed inset-0 z-[100] modal-overlay flex items-center justify-center hidden opacity-0"
      onclick="closeSemesterModalOnOutsideClick(event)"
    >
      <div
        class="modal-content p-10 rounded-2xl max-w-lg w-full text-center shadow-2xl transform scale-95"
        id="modal-box"
      >
        <h2 class="text-3xl font-bold mb-2 heading-text">Select Semester</h2>
        <p class="mb-8 text-sm muted-text">
          You will be redirected to the curriculum page.
        </p>

        <div class="grid grid-cols-2 gap-4">
          <button
            onclick="selectSemesterAndRedirect('sem1')"
            class="notes-card p-6 text-lg font-medium hover:scale-105 transition-transform cursor-pointer"
          >
            Semester 1
          </button>
          <button
            onclick="selectSemesterAndRedirect('sem2')"
            class="notes-card p-6 text-lg font-medium hover:scale-105 transition-transform cursor-pointer"
          >
            Semester 2
          </button>
          <button
            onclick="selectSemesterAndRedirect('sem3')"
            class="notes-card p-6 text-lg font-medium hover:scale-105 transition-transform cursor-pointer"
          >
            Semester 3
          </button>
          <button
            onclick="selectSemesterAndRedirect('sem4')"
            class="notes-card p-6 text-lg font-medium hover:scale-105 transition-transform cursor-pointer"
          >
            Semester 4
          </button>
          <button
            onclick="selectSemesterAndRedirect('sem5')"
            class="notes-card p-6 text-lg font-medium hover:scale-105 transition-transform cursor-pointer"
          >
            Semester 5
          </button>
          <button
            onclick="selectSemesterAndRedirect('sem6')"
            class="notes-card p-6 text-lg font-medium hover:scale-105 transition-transform cursor-pointer"
          >
            Semester 6
          </button>
        </div>

        <button
          onclick="closeSemesterModal()"
          class="mt-8 text-sm underline muted-text hover:text-current transition-colors"
        >
          Close
        </button>
      </div>
    </div>

    <nav
      class="sticky top-0 z-50 backdrop-blur-md border-b nav-container transition-colors duration-300"
    >
      <div
        class="container mx-auto px-6 h-20 flex items-center justify-between"
      >
        <a href="index.html" class="flex items-center gap-2 group">
          <div
            class="w-10 h-10 rounded-lg flex items-center justify-center font-bold text-xl transition-transform group-hover:scale-105 logo-box"
          >
            E<span class="text-red-500">.</span>
          </div>
          <span class="text-xl font-bold tracking-tight heading-text"
            >Examly</span
          >
        </a>

        <div class="flex items-center gap-4">
          <button
            id="theme-toggle"
            class="p-2 rounded-full hover-bg-card transition-colors muted-text hover:text-current"
          >
            <i data-lucide="moon" class="w-5 h-5"></i>
          </button>
        </div>
      </div>
    </nav>

    <header
      class="relative pt-20 pb-32 overflow-hidden flex flex-col items-center justify-center min-h-[85vh]"
    >
      <div
        class="absolute left-[5%] top-[15%] hidden xl:block w-48 h-80 animate-float pointer-events-none"
      >
        <img
          src="Study.png"
          class="w-full h-full object-contain grayscale opacity-80 drop-shadow-2xl light-invert"
          alt="Studying"
        />
      </div>

      <div
        class="absolute right-[5%] bottom-[15%] hidden xl:block w-48 h-48 animate-float pointer-events-none"
        style="animation-delay: 2s"
      >
        <i
          data-lucide="graduation-cap"
          class="w-full h-full stroke-[1px] muted-text"
        ></i>
      </div>

      <div
        class="container mx-auto px-6 relative z-10 text-center max-w-4xl flex flex-col items-center"
      >
        <div
          class="hero-animate inline-flex items-center gap-2 nav-badge mb-8 cursor-pointer hover:scale-105 transition-transform"
          onclick="openSemesterModal()"
        >
          <span>Get Started</span>
          <i data-lucide="arrow-right" class="w-3 h-3"></i>
        </div>

        <h1
          class="hero-animate text-5xl md:text-7xl font-extrabold tracking-tight mb-6 leading-[1.1] heading-text"
        >
          Your all-in-one <br />
          learning platform
          <span
            class="block text-4xl md:text-6xl font-handwriting mt-3 transform -rotate-2 muted-text"
            >smart & simple</span
          >
        </h1>

        <div
          id="quote-container"
          class="hero-animate w-full max-w-2xl mx-auto mb-10 bg-card p-8 rounded-xl border section-border relative overflow-hidden shadow-inner text-left"
        >
          <i
            data-lucide="quote"
            class="absolute top-4 left-4 w-6 h-6 muted-text opacity-20"
          ></i>
          <p
            id="random-quote"
            class="text-xl font-medium heading-text italic mb-4 text-center pl-6 pr-6"
          >
            "Loading inspiration..."
          </p>
          <p
            id="quote-author"
            class="text-sm muted-text font-bold uppercase tracking-widest text-right"
          >
            — ...
          </p>
        </div>

        <button
          onclick="openSemesterModal()"
          class="hero-animate btn-primary px-8 py-4 text-base flex items-center gap-2 group shadow-lg mx-auto"
        >
          Select Semester
          <i
            data-lucide="arrow-right"
            class="w-4 h-4 group-hover:translate-x-1 transition-transform"
          ></i>
        </button>
      </div>
    </header>

    <footer
      class="py-10 border-t section-border mt-12 bg-page transition-colors duration-300"
    >
      <div
        class="container mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <div class="text-sm muted-text text-center md:text-left">
          &copy; 2026 Examly. All rights reserved.
        </div>
        <div class="flex flex-col md:flex-row items-center gap-4 md:gap-6">
          <span class="text-sm muted-text"
            >Built by
            <span class="heading-text font-medium">Aadarsh</span></span
          >
          <div class="flex items-center gap-4">
            <a
              href="https://www.linkedin.com/in/aadarsh-mishra-440126256/"
              target="_blank"
              rel="noopener noreferrer"
              class="muted-text hover:heading-text transition-colors p-1 transform hover:scale-110"
              ><i data-lucide="linkedin" class="w-5 h-5"></i
            ></a>
            <a
              href="https://github.com/aadarshm24"
              target="_blank"
              rel="noopener noreferrer"
              class="muted-text hover:heading-text transition-colors p-1 transform hover:scale-110"
              ><i data-lucide="github" class="w-5 h-5"></i
            ></a>
            <a
              href="https://x.com/aadarshm24"
              target="_blank"
              rel="noopener noreferrer"
              class="muted-text hover:heading-text transition-colors p-1 transform hover:scale-110"
              ><i data-lucide="twitter" class="w-5 h-5"></i
            ></a>
          </div>
        </div>
      </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="script.js"></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        gsap.from(".hero-animate", {
          y: 30,
          opacity: 0,
          duration: 0.8,
          stagger: 0.15,
          ease: "power3.out",
          delay: 0.2,
        });
      });
    </script>
  </body>
</html>
